name: HTML to PDF

on:
  push:
    branches: [master, main]
    paths:
      - 'index.html'
      - 'index-ru.html'
      - 'css/**'
  workflow_dispatch:

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate PDF
        run: node scripts/generate-pdf.js

      - name: Commit and push PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add files/cv_igor_razumny.pdf files/cv_igor_razumny_ru.pdf
          if git diff --staged --quiet; then
            echo "No PDF changes"
          else
            git commit -m "chore: update CV PDF [skip ci]"
            git push
          fi
